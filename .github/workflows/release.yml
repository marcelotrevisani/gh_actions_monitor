name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write     # needed to attach the zip to a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [[ -z "${VERSION}" ]]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache IntelliJ Platform binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains.intellij*
            .intellijPlatform
          key: ij-platform-${{ runner.os }}-${{ hashFiles('build.gradle.kts', 'gradle.properties') }}
          restore-keys: ij-platform-${{ runner.os }}-

      - name: Run tests
        run: ./gradlew --no-daemon -PpluginVersion=${{ steps.version.outputs.version }} test

      - name: Build plugin
        run: ./gradlew --no-daemon -PpluginVersion=${{ steps.version.outputs.version }} buildPlugin

      - name: Verify plugin against target IDEs
        run: ./gradlew --no-daemon -PpluginVersion=${{ steps.version.outputs.version }} verifyPlugin

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}
        run: ./gradlew --no-daemon -PpluginVersion=${{ steps.version.outputs.version }} publishPlugin

      - name: Upload distribution as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ steps.version.outputs.version }}
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
