name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write     # needed to attach the zip to a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [[ -z "${VERSION}" ]]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache IntelliJ Platform binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains.intellij*
            .intellijPlatform
          key: ij-platform-${{ runner.os }}-${{ hashFiles('build.gradle.kts', 'gradle.properties') }}
          restore-keys: ij-platform-${{ runner.os }}-

      - name: Run tests
        run: ./gradlew --no-daemon -PpluginVersion=${{ steps.version.outputs.version }} test

      - name: Build plugin
        run: ./gradlew --no-daemon -PpluginVersion=${{ steps.version.outputs.version }} buildPlugin

      - name: Verify plugin against target IDEs
        run: ./gradlew --no-daemon -PpluginVersion=${{ steps.version.outputs.version }} verifyPlugin

      # Marketplace upload is disabled for now — uploads to plugins.jetbrains.com
      # are performed manually until the plugin's listing is stable. The built zip
      # is still attached to the GitHub Release below, which serves as the
      # distribution channel in the meantime.
      #
      # To re-enable: uncomment the step below and ensure the JETBRAINS_PUBLISH_TOKEN
      # repository secret is set (https://plugins.jetbrains.com/author/me/tokens,
      # scope "Plugin upload").
      #
      # - name: Publish to JetBrains Marketplace
      #   env:
      #     PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}
      #   run: ./gradlew --no-daemon -PpluginVersion=${{ steps.version.outputs.version }} publishPlugin

      - name: Upload distribution as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ steps.version.outputs.version }}
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 90

      # Creates (or reuses) the v<version> tag and publishes a GitHub Release with
      # the plugin zip attached. softprops/action-gh-release creates the tag pointing
      # at the current commit if it doesn't exist, which is what we want for the
      # workflow_dispatch path. On tag-push the tag already exists and the action
      # just attaches the zip + notes.
      - name: Create GitHub Release with plugin zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: build/distributions/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
